<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classificador de Imagem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    :root {
      --brand: #6C63FF;
      --brand-dark: #534AB7;
      --brand-light: #EEEDFE;
      --card-radius: 16px;
      --btn-radius: 12px;
    }

    body {
      background: #f4f3ff;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #2c2c2a;
    }

    /* ── top bar ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e0deff;
      padding: 0.75rem 1.25rem;
    }
    .topbar-brand {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--brand-dark);
      letter-spacing: -0.3px;
    }
    .topbar-brand span {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--brand);
      margin-right: 6px;
      vertical-align: middle;
    }

    /* ── main card ── */
    .main-card {
      background: #fff;
      border-radius: var(--card-radius);
      border: 1px solid #e0deff;
      overflow: hidden;
    }

    /* ── camera panel ── */
    #webcam-container {
      background: #f0effb;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--card-radius) 0 0 var(--card-radius);
      overflow: hidden;
      position: relative;
    }
    @media (max-width: 767px) {
      #webcam-container { border-radius: var(--card-radius) var(--card-radius) 0 0; min-height: 260px; }
    }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #888;
    }
    .cam-placeholder svg { opacity: 0.35; }
    .cam-placeholder p { font-size: 0.9rem; margin: 0; }

    #webcam-container canvas {
      max-width: 100%;
      max-height: 100%;
      border-radius: 0;
      display: block;
    }

    /* ── camera button ── */
    .btn-cam {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--btn-radius);
      padding: 0.65rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      box-shadow: 0 4px 14px rgba(108,99,255,0.28);
    }
    .btn-cam:hover {
      background: var(--brand-dark);
      box-shadow: 0 6px 18px rgba(108,99,255,0.38);
      transform: translateY(-1px);
      color: #fff;
    }
    .btn-cam:active { transform: translateY(0); box-shadow: none; }

    .btn-cam .cam-ring {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .btn-stop {
      background: transparent;
      color: #888;
      border: 1px solid #d0cff0;
      border-radius: var(--btn-radius);
      padding: 0.65rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .btn-stop:hover { background: #f8f7ff; color: #555; }

    /* ── results panel ── */
    .results-panel {
      padding: 1.5rem;
      border-left: 1px solid #e0deff;
    }
    @media (max-width: 767px) {
      .results-panel { border-left: none; border-top: 1px solid #e0deff; }
    }

    .results-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 1rem;
    }

    /* status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #f0effb;
      color: #777;
    }
    .status-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c0beff;
    }
    .status-pill.active .dot {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }
    .status-pill.active { color: #15803d; background: #f0fdf4; }

    /* label row */
    .label-row { margin-bottom: 0.85rem; }
    .label-row-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .label-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: #3c3489;
    }
    .label-pct {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--brand);
      min-width: 36px;
      text-align: right;
    }

    /* progress bar */
    .prog-track {
      height: 10px;
      border-radius: 99px;
      background: #ece9ff;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #9f99f5 0%, var(--brand) 100%);
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }
    .prog-fill.top {
      background: linear-gradient(90deg, #818cf8 0%, #6C63FF 50%, #4f46e5 100%);
    }

    /* empty state */
    .empty-labels {
      color: #bbb;
      font-size: 0.88rem;
      text-align: center;
      padding: 2rem 0;
    }

    /* ── footer ── */
    .main-footer {
      border-top: 1px solid #e0deff;
      padding: 0.75rem 1.25rem;
      font-size: 0.78rem;
      color: #aaa;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<header class="topbar d-flex align-items-center justify-content-between">
  <div class="topbar-brand">
    <span></span>Classificador Visual
  </div>
  <div class="d-flex align-items-center gap-2">
    <button id="stopBtn" class="btn-stop" type="button" style="display:none;">
      Parar câmera
    </button>
    <button id="startBtn" class="btn-cam" type="button" aria-pressed="false">
      <div class="cam-ring">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path d="M10.5 2.5L9 4H7L5.5 2.5H3A1.5 1.5 0 0 0 1.5 4v8A1.5 1.5 0 0 0 3 13.5h10a1.5 1.5 0 0 0 1.5-1.5V4A1.5 1.5 0 0 0 13 2.5h-2.5zM8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
      </div>
      <span id="startLabel">Iniciar câmera</span>
    </button>
  </div>
</header>

<!-- Main content -->
<main class="container-fluid py-3 px-3 px-md-4">
  <div class="main-card">
    <div class="row g-0">

      <!-- Camera panel -->
      <div class="col-md-7">
        <div id="webcam-container" class="p-2">
          <div class="cam-placeholder" id="camPlaceholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="#6C63FF" viewBox="0 0 16 16">
              <path d="M10.5 2.5L9 4H7L5.5 2.5H3A1.5 1.5 0 0 0 1.5 4v8A1.5 1.5 0 0 0 3 13.5h10a1.5 1.5 0 0 0 1.5-1.5V4A1.5 1.5 0 0 0 13 2.5h-2.5zM8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
            </svg>
            <p>Câmera não iniciada</p>
            <p style="font-size:0.78rem;">Clique em <strong>Iniciar câmera</strong> para começar</p>
          </div>
        </div>
      </div>

      <!-- Results panel -->
      <aside class="col-md-5">
        <div class="results-panel h-100 d-flex flex-column">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="results-title">Resultados</div>
            <div class="status-pill" id="statusPill">
              <div class="dot"></div>
              <span id="statusText">Aguardando</span>
            </div>
          </div>

          <div id="label-container" class="flex-grow-1">
            <div class="empty-labels" id="emptyState">
              Inicie a câmera para ver<br>as predições em tempo real.
            </div>
          </div>
        </div>
      </aside>

    </div>
  </div>
</main>

<!-- Footer -->
<footer class="main-footer">
  <span>Modelo: <code>./my_model/</code></span>
  <span>Feito com Teachable Machine &amp; TensorFlow.js</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* ──────────────────────────────────────────────────
     UI helpers — conecte aqui a lógica do TensorFlow
  ────────────────────────────────────────────────── */
  const startBtn    = document.getElementById('startBtn');
  const stopBtn     = document.getElementById('stopBtn');
  const startLabel  = document.getElementById('startLabel');
  const statusPill  = document.getElementById('statusPill');
  const statusText  = document.getElementById('statusText');
  const labelCont   = document.getElementById('label-container');
  const emptyState  = document.getElementById('emptyState');
  const placeholder = document.getElementById('camPlaceholder');

  /* Atualiza o pill de status */
  function setStatus(text, active = false) {
    statusText.textContent = text;
    statusPill.classList.toggle('active', active);
  }

  /* Cria / atualiza as barras de progresso
     labels: array de { name: string, probability: number (0-1) }
  */
  function renderLabels(labels) {
    if (!labels || labels.length === 0) return;

    emptyState && emptyState.remove();
    labelCont.innerHTML = '';

    const sorted = [...labels].sort((a, b) => b.probability - a.probability);
    const top    = sorted[0].name;

    sorted.forEach(({ name, probability }) => {
      const pct   = Math.round(probability * 100);
      const isTop = name === top;

      const row = document.createElement('div');
      row.className = 'label-row';
      row.innerHTML = `
        <div class="label-row-header">
          <span class="label-name">${name}</span>
          <span class="label-pct">${pct}%</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill ${isTop ? 'top' : ''}" style="width: ${pct}%"></div>
        </div>
      `;
      labelCont.appendChild(row);
    });
  }

  /* ── Exemplo: simula predições para demonstração ──
     Remova este bloco e conecte ao loop do Teachable Machine */
  let demoInterval = null;
  const demoClasses = ['Classe A', 'Classe B', 'Classe C'];

  function startDemo() {
    demoInterval = setInterval(() => {
      const raw = demoClasses.map(() => Math.random());
      const sum = raw.reduce((a, b) => a + b, 0);
      const labels = demoClasses.map((name, i) => ({
        name,
        probability: raw[i] / sum
      }));
      renderLabels(labels);
    }, 600);
  }

  function stopDemo() {
    clearInterval(demoInterval);
    demoInterval = null;
  }
  /* ── fim do bloco de demonstração ── */

  startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    stopBtn.style.display  = '';
    placeholder && (placeholder.style.display = 'none');
    setStatus('Analisando...', true);
    startLabel.textContent = 'Câmera ativa';
    startDemo(); // substitua por: init() do Teachable Machine
  });

  stopBtn.addEventListener('click', () => {
    stopBtn.style.display  = 'none';
    startBtn.style.display = '';
    placeholder && (placeholder.style.display = 'flex');
    setStatus('Aguardando', false);
    labelCont.innerHTML = `<div class="empty-labels" id="emptyState">
      Inicie a câmera para ver<br>as predições em tempo real.
    </div>`;
    stopDemo(); // substitua por: parar webcam
  });
</script>
</body>
</html>
